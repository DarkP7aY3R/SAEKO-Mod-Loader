[texture_packs]
enabled=true

# Exports SAEKO's embedded PNG files to:
#   saeko_mod_loader/texture_packs/default/
# Default is false to avoid slow/glitchy startup. Use the in-game Mods popup
# button "Generate textures", or set this true if you intentionally want
# auto-export at process start.
export_default=false
overwrite_default=false

# Comma-separated pack priority. First pack wins.
# Leave empty for vanilla textures after the default export is created.
# Example:
# active_packs=my_hd_pack,my_ui_pack
active_packs=

# Allow loading files from the generated default folder if you put it here.
# Recommended workflow: copy default to a new folder and edit that copy.
allow_default_pack=false

# Safety limit for a single replacement PNG.
max_file_mb=64
