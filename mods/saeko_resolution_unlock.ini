[resolution_unlock]
enabled=true

# How the game canvas is mapped to non-16:9 resolutions.
# stretch = default texture stretch; returns the selected WxH canvas so Ebiten
#           fills the whole window/screen, while font scale still follows 16:9
# fill    = crop/fill overscan; keeps proportions but may cut off edges
# native  = old behavior; internal canvas is exactly the selected WxH resolution
render_mode=stretch

# Alias for modders who prefer a direct switch name. If true, this forces
# render_mode=stretch even when older configs used fill/crop defaults.
stretch_textures=true

# Design aspect used by fill and by stretch font scaling. SAEKO's art and UI are authored around 16:9.
base_aspect=16:9

# 16:9 and 16:10 test list. You can reorder or remove entries.
resolutions=1280x720,1600x900,1920x1080,2560x1440,3840x2160,1280x800,1440x900,1680x1050,1920x1200,2560x1600
