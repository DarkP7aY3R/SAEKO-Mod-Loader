# SAEKO universal mod loader configuration

# Switch for the built-in language/translation mod. The loader core always stays active.
# Extra DLL mods in saeko_mod_loader/mods are toggled individually by .dll.disabled.
mods_enabled=true

# Language code added to SAEKO as a separate language.
# Change this for a real translation mod, for example: pl, es_custom, fan_ptbr.
language_code=custom

# Label shown in the game's language menu when every expected CSV is present.
language_label=Custom

# Built-in language used as fallback for missing CSV files.
fallback_language=en

# Built-in language used when the in-game button generates CSV files for translators.
template_source_language=ja

# Where the installer copies CSV files inside the game folder.
# The DLL reads CSV files from this same path at runtime.
translation_dir=saeko_mod_loader/lang
